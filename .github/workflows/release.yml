name: Release

# The release pipeline builds the Mac app with the Manager frozen in, signs it (Developer ID,
# hardened runtime), notarizes + staples, generates an EdDSA-signed Sparkle appcast, and publishes
# both to a GitHub Release. The app's SUFeedURL points at releases/latest/download/appcast.xml, so a
# shipped build auto-updates itself. The signed .zip is also kept as a workflow artifact (and is the
# only output on a dry run).
#
# Triggers: a twice-daily SCHEDULE auto-publishes a PATCH bump when main has moved since the last
# release (so merges reach installed apps within ~12h, without a release per PR); a workflow_dispatch
# with a version cuts a minor/major bump (or dry-runs); a v* tag push also releases. The "Decide"
# step computes the version + whether there's anything to ship.
#
# Signing is keychain-INDEPENDENT: the job builds a throwaway keychain from a .p12 secret and
# notarizes with the ASC API key directly. So it does NOT touch (and doesn't depend on) miquon's
# login keychain, which is corrupted. Required secrets:
#   MACOS_CERT_P12_BASE64     base64 of a Developer ID Application .p12 (cert + private key)
#   MACOS_CERT_PASSWORD       the .p12 export password
#   MACOS_NOTARY_KEY_P8_BASE64  base64 of the ASC API key .p8 (AuthKey_*.p8)
#   MACOS_NOTARY_KEY_ID       the key id (e.g. S4RCNDTD37)
#   MACOS_NOTARY_ISSUER_ID    the issuer uuid
#   SPARKLE_ED_PRIVATE_KEY    base64 of the 32-byte Ed25519 seed that signs the appcast; its PUBLIC
#                             half is SUPublicEDKey in macapp/Info.plist. Keep it STABLE — rotating
#                             it makes already-installed apps reject every future update.

on:
  schedule:
    # Twice daily (09:00 + 21:00 UTC): if main moved since the last release, auto-publish a PATCH
    # bump. So changes reach installed apps within ~12h without a release per merge. Minor/major
    # bumps are a manual workflow_dispatch with a version.
    - cron: "0 9,21 * * *"
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (e.g. 0.2.0) for a minor/major bump. Blank = auto patch-bump."
        required: false
      dry_run:
        description: "Sign but skip notarization + publish (fast keychain/sign check)"
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight notarization

permissions:
  contents: write   # create the GitHub Release + upload the zip/appcast (GITHUB_TOKEN)

jobs:
  release:
    runs-on: [self-hosted, macOS, ARM64]   # miquon
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tags + history to diff main against the last release

      - name: Decide version + whether to release
        id: v
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          # Git tags (the published releases) are the version source of truth, not project.yml.
          last="$(gh release view --json tagName -q .tagName 2>/dev/null || true)"
          autobump() {   # next PATCH after the last release; bootstrap from project.yml if none exist
            if [ -z "$last" ]; then
              grep -m1 'MARKETING_VERSION:' macapp/project.yml | tr -cd '0-9.'
              return
            fi
            local v="${last#v}"; local IFS=.; set -- $v
            echo "${1:-0}.${2:-0}.$(( ${3:-0} + 1 ))"
          }
          release=true
          case "$GITHUB_EVENT_NAME" in
            push)               ver="${GITHUB_REF_NAME#v}" ;;                  # a v* tag was pushed
            workflow_dispatch)  ver="${INPUT_VERSION:-$(autobump)}" ;;         # input wins; else patch-bump
            schedule)
              ver="$(autobump)"
              # Only cut a scheduled release if main actually moved since the last one.
              if [ -n "$last" ] && [ "$(git rev-list "${last}..HEAD" --count 2>/dev/null || echo 1)" = "0" ]; then
                release=false
              fi ;;
          esac
          echo "marketing=$ver" >> "$GITHUB_OUTPUT"
          echo "build=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
          echo "release=$release" >> "$GITHUB_OUTPUT"
          if [ "$release" = "true" ]; then
            echo "Releasing v$ver (build $GITHUB_RUN_NUMBER, event=$GITHUB_EVENT_NAME)"
          else
            echo "No changes since ${last:-<none>} — skipping this scheduled release."
          fi

      - name: Set up a throwaway signing keychain
        if: ${{ steps.v.outputs.release == 'true' }}
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          [ -n "${CERT_P12_BASE64:-}" ] || { echo "::error::secret MACOS_CERT_P12_BASE64 is not set — see release.yml header"; exit 1; }
          kc="$RUNNER_TEMP/loopworker-signing.keychain-db"
          kc_pw="$(openssl rand -base64 24)"
          cert="$RUNNER_TEMP/cert.p12"
          printf '%s' "$CERT_P12_BASE64" | base64 --decode > "$cert"
          # Remember the current search list so cleanup restores it; we prepend our own keychain
          # and never touch the (corrupt) login keychain.
          security list-keychains -d user | sed 's/[" ]//g' > "$RUNNER_TEMP/orig-keychains.txt"
          security create-keychain -p "$kc_pw" "$kc"
          security set-keychain-settings -lut 21600 "$kc"          # don't auto-lock during the build
          security unlock-keychain -p "$kc_pw" "$kc"
          security import "$cert" -k "$kc" -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          # Authorize codesign to use the key with no GUI prompt — the errSecInternalComponent fix.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$kc_pw" "$kc" >/dev/null
          # shellcheck disable=SC2046  # each keychain path is its own arg
          security list-keychains -d user -s "$kc" $(cat "$RUNNER_TEMP/orig-keychains.txt")
          rm -f "$cert"
          echo "SIGNING_KEYCHAIN=$kc" >> "$GITHUB_ENV"
          echo "Identities in the signing keychain:"
          security find-identity -v -p codesigning "$kc"

      - name: Build · sign · notarize · staple
        if: ${{ steps.v.outputs.release == 'true' }}
        working-directory: macapp
        env:
          LOOPWORKER_MARKETING_VERSION: ${{ steps.v.outputs.marketing }}
          LOOPWORKER_BUILD_VERSION: ${{ steps.v.outputs.build }}
          LOOPWORKER_SKIP_NOTARIZE: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
          NOTARY_KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_KEY_P8_BASE64 }}
          LOOPWORKER_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          LOOPWORKER_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [ -n "${NOTARY_KEY_P8_BASE64:-}" ]; then
            key="$RUNNER_TEMP/notary.p8"
            printf '%s' "$NOTARY_KEY_P8_BASE64" | base64 --decode > "$key"
            export LOOPWORKER_NOTARY_KEY="$key"
          fi
          ./sign-and-notarize.sh

      - name: Upload signed app artifact
        if: ${{ steps.v.outputs.release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: KojaLoopsManager-${{ steps.v.outputs.marketing }}
          path: macapp/build/release-dd/LoopWorker.zip
          if-no-files-found: error

      # Phase B: appcast + publish. Skipped on a dry run (no notarized zip to ship).
      - name: Generate Sparkle appcast
        if: ${{ steps.v.outputs.release == 'true' && github.event.inputs.dry_run != 'true' }}
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          VERSION: ${{ steps.v.outputs.marketing }}
        run: |
          set -euo pipefail
          [ -n "${SPARKLE_ED_PRIVATE_KEY:-}" ] || { echo "::error::secret SPARKLE_ED_PRIVATE_KEY is not set — see release.yml header"; exit 1; }
          # Sparkle's generate_appcast, pinned to the SPM framework version; --ed-key-file - reads the
          # private seed from stdin (keychain-independent). It reads each archive's version from the
          # .app's Info.plist inside the zip, so the version we injected at build drives the feed.
          tools="$RUNNER_TEMP/sparkle-tools"
          mkdir -p "$tools"
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/2.9.4/Sparkle-2.9.4.tar.xz" \
            | tar -xJ -C "$tools" bin/generate_appcast
          # generate_appcast reads the update's version from the .app's CFBundleVersion, which comes
          # from GENERATE_INFOPLIST_FILE merging over our partial Info.plist. If that merge ever breaks
          # the version goes empty and Sparkle silently stops seeing updates — fail loud here instead.
          built="macapp/build/release-dd/Build/Products/Release/Koja Loops Manager.app"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$built/Contents/Info.plist" | grep -q . \
            || { echo "::error::built app has no CFBundleVersion — the Info.plist merge broke"; exit 1; }
          out="$RUNNER_TEMP/appcast"
          mkdir -p "$out"
          cp macapp/build/release-dd/LoopWorker.zip "$out/LoopWorker.zip"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$tools/bin/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/" \
            --link "https://github.com/${GITHUB_REPOSITORY}" \
            -o "$out/appcast.xml" \
            "$out"
          echo "RELEASE_ZIP=$out/LoopWorker.zip" >> "$GITHUB_ENV"
          echo "APPCAST=$out/appcast.xml" >> "$GITHUB_ENV"
          echo "----- appcast.xml -----"; cat "$out/appcast.xml"

      - name: Publish GitHub Release
        if: ${{ steps.v.outputs.release == 'true' && github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.v.outputs.marketing }}
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"   # gh lives in Homebrew on the runner
          command -v gh >/dev/null || { echo "::error::gh not found on the runner (needed to publish)"; exit 1; }
          tag="v${VERSION}"
          # Idempotent: create the release (tagging the built commit) or refresh its assets in place,
          # so re-dispatching the same version updates rather than errors. --latest keeps
          # releases/latest/download/appcast.xml pointing here, which is what SUFeedURL resolves.
          # The tag is created by GITHUB_TOKEN, so it does NOT re-fire the on:push:tags run (GitHub
          # suppresses that) — no duplicate build. Don't swap in a PAT here or you'd get a loop.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$RELEASE_ZIP" "$APPCAST" --clobber
          else
            gh release create "$tag" "$RELEASE_ZIP" "$APPCAST" \
              --target "$GITHUB_SHA" --title "$tag" --generate-notes --latest
          fi
          echo "Published $tag → https://github.com/${GITHUB_REPOSITORY}/releases/tag/$tag"

      - name: Clean up signing keychain
        if: always()
        run: |
          if [ -n "${SIGNING_KEYCHAIN:-}" ]; then security delete-keychain "$SIGNING_KEYCHAIN" 2>/dev/null || true; fi
          if [ -f "$RUNNER_TEMP/orig-keychains.txt" ]; then
            # shellcheck disable=SC2046
            security list-keychains -d user -s $(cat "$RUNNER_TEMP/orig-keychains.txt") || true
          fi
          rm -f "$RUNNER_TEMP/notary.p8" "$RUNNER_TEMP/cert.p12" 2>/dev/null || true
