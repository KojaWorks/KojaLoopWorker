name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest   # GitHub-hosted, not self-hosted: this repo is public, so a fork
                             # PR's pytest/pip must NOT run on our own raheth. Free on public repos.
    strategy:
      matrix:
        # requires-python floor and the version the miquon host actually runs
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -q
