# xcodegen spec for the LoopWorker menu-bar app. Generate + open with:
#   cd macapp && xcodegen generate && open LoopWorker.xcodeproj
# The generated .xcodeproj is git-ignored; project.yml is the source of truth.
name: LoopWorker
options:
  bundleIdPrefix: dev.nevyn.loopworker
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    # Swift 5 language mode for the scaffold — avoids Swift-6 strict-concurrency churn on a
    # small menu-bar app. Bump to 6 once the shape settles.
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    # Partial base plist for keys Xcode won't generate (the Sparkle SU* keys); generated CFBundle*
    # + INFOPLIST_KEY_* still merge on top. See Info.plist.
    INFOPLIST_FILE: Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: works.koja.loopworker
    # User-facing name (menu-bar menu, About, Finder). The target/bundle stay "LoopWorker".
    INFOPLIST_KEY_CFBundleDisplayName: "Koja Loops Manager"
    # Koja's Apple team, for signing/notarization (card ~824). Signing is still gated on the
    # Developer ID cert + notarization creds; this just wires the team so a signed build works.
    DEVELOPMENT_TEAM: M4Q2TE45WT
    # Agent app: no Dock icon, lives in the menu bar only.
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSHumanReadableCopyright: "MIT"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.4"
targets:
  LoopWorker:
    type: application
    platform: macOS
    sources:
      - path: Sources
    # Sparkle drives auto-update (Check for Updates + scheduled background checks). The Swift code
    # is guarded by #if canImport(Sparkle), so removing this dependency still builds; the release
    # pipeline signs Sparkle's embedded helpers inside-out (see sign-and-notarize.sh).
    dependencies:
      - package: Sparkle
    postBuildScripts:
      # Freeze the Python Manager and drop it into Resources/loopworker, so the app is
      # self-contained — it runs with no `loopworker` installed on the user's machine.
      # freeze-manager.sh is idempotent (skips the rebuild when the binary is already fresh).
      - name: Bundle frozen Manager
        basedOnDependencyAnalysis: false
        script: |
          "$PROJECT_DIR/freeze-manager.sh"
          dest="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          mkdir -p "$dest"
          cp -f "$PROJECT_DIR/build/manager/loopworker" "$dest/loopworker"
