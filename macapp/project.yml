# xcodegen spec for the LoopWorker menu-bar app. Generate + open with:
#   cd macapp && xcodegen generate && open LoopWorker.xcodeproj
# The generated .xcodeproj is git-ignored; project.yml is the source of truth.
name: LoopWorker
options:
  bundleIdPrefix: dev.nevyn.loopworker
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    # Swift 5 language mode for the scaffold — avoids Swift-6 strict-concurrency churn on a
    # small menu-bar app. Bump to 6 once the shape settles.
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_BUNDLE_IDENTIFIER: dev.nevyn.loopworker.menubar
    # Agent app: no Dock icon, lives in the menu bar only.
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSHumanReadableCopyright: "MIT"
targets:
  LoopWorker:
    type: application
    platform: macOS
    sources:
      - path: Sources
    # Sparkle is added on demand (see macapp/README.md) — kept out of the default spec so a
    # fresh checkout builds fully offline. The Sparkle code is guarded by #if canImport(Sparkle).
